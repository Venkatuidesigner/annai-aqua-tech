<div class="gallery-wrapper">

  <!-- Main Image -->
  <div
    class="main-image-container relative overflow-hidden rounded-2xl bg-gradient-to-br from-blue-50 to-cyan-50 dark:from-gray-800 dark:to-gray-700 cursor-zoom-in mb-4"
    (click)="openLightbox()"
    [class.cursor-zoom-out]="isZoomed()"
  >
    <img
      [@fadeImage]
      [src]="activeImage"
      [alt]="productName"
      class="main-image w-full h-80 md:h-96 object-contain p-6 transition-transform duration-500"
      [class.scale-150]="isZoomed()"
      (error)="onImageError(activeIndex())"
      loading="eager"
    />

    <!-- Zoom hint -->
    <div class="absolute bottom-3 right-3 bg-black/40 text-white text-xs px-2 py-1 rounded-lg flex items-center gap-1 opacity-60">
      <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/>
      </svg>
      Click to zoom
    </div>

    <!-- Nav arrows (for multiple images) -->
    @if (images.length > 1) {
      <button
        (click)="prevImage(); $event.stopPropagation()"
        class="absolute left-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-white/80 dark:bg-gray-800/80 shadow-lg flex items-center justify-center text-gray-700 dark:text-gray-200 hover:bg-white hover:scale-110 transition-all duration-200"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <button
        (click)="nextImage(); $event.stopPropagation()"
        class="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-white/80 dark:bg-gray-800/80 shadow-lg flex items-center justify-center text-gray-700 dark:text-gray-200 hover:bg-white hover:scale-110 transition-all duration-200"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    }
  </div>

  <!-- Thumbnail Strip -->
  @if (images.length > 1) {
    <div class="flex items-center gap-2 overflow-x-auto pb-2">
      @for (img of images; track img; let i = $index) {
        <button
          (click)="selectImage(i)"
          class="thumbnail flex-shrink-0 w-16 h-16 rounded-xl overflow-hidden border-2 transition-all duration-200"
          [class.border-blue-500]="activeIndex() === i"
          [class.border-transparent]="activeIndex() !== i"
          [class.scale-105]="activeIndex() === i"
          [class.shadow-md]="activeIndex() === i"
          [attr.aria-label]="'View image ' + (i + 1)"
        >
          <img
            [src]="imageError()[i] ? getFallback() : img"
            [alt]="productName + ' image ' + (i + 1)"
            class="w-full h-full object-contain p-1 bg-gradient-to-br from-blue-50 to-cyan-50 dark:from-gray-700 dark:to-gray-800"
            (error)="onImageError(i)"
            loading="lazy"
          />
        </button>
      }
    </div>

    <!-- Dot indicators -->
    <div class="flex items-center justify-center gap-1.5 mt-3">
      @for (img of images; track img; let i = $index) {
        <button
          (click)="selectImage(i)"
          class="rounded-full transition-all duration-200"
          [class.w-6]="activeIndex() === i"
          [class.w-2]="activeIndex() !== i"
          [class.h-2]="true"
          [class.bg-blue-600]="activeIndex() === i"
          [class.bg-gray-300]="activeIndex() !== i"
          [class.dark:bg-gray-600]="activeIndex() !== i"
        ></button>
      }
    </div>
  }
</div>

<!-- Lightbox -->
@if (lightboxOpen()) {
  <div
    class="lightbox-overlay"
    (click)="closeLightbox()"
    (keydown.escape)="closeLightbox()"
    tabindex="0"
    role="dialog"
    aria-label="Image lightbox"
  >
    <div class="relative max-w-4xl max-h-full p-4" (click)="$event.stopPropagation()">

      <button
        (click)="closeLightbox()"
        class="absolute -top-2 -right-2 w-10 h-10 rounded-full bg-white/20 hover:bg-white/40 flex items-center justify-center text-white transition-all duration-200 z-10"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <img
        [src]="activeImage"
        [alt]="productName"
        class="max-h-screen max-w-full object-contain rounded-2xl shadow-2xl"
      />

      @if (images.length > 1) {
        <button
          (click)="prevImage()"
          class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-12 w-10 h-10 rounded-full bg-white/20 hover:bg-white/40 flex items-center justify-center text-white transition-all duration-200"
        >
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <button
          (click)="nextImage()"
          class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-12 w-10 h-10 rounded-full bg-white/20 hover:bg-white/40 flex items-center justify-center text-white transition-all duration-200"
        >
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      }
    </div>
  </div>
}
