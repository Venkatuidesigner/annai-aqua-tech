@if (fullScreen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-white/80 dark:bg-gray-950/80 backdrop-blur-sm">
    <div class="flex flex-col items-center gap-4">
      <div class="spinner" [class]="'spinner-' + size"></div>
      @if (text) {
        <p class="text-gray-600 dark:text-gray-400 font-medium animate-pulse">{{ text }}</p>
      }
    </div>
  </div>
} @else {
  <div class="flex items-center justify-center p-8">
    <div class="spinner" [class]="'spinner-' + size"></div>
  </div>
}
