name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Patch browserslist — replace regex with string ops (no slash in pattern)
        run: |
          cat > /tmp/patch_browserslist.py << 'PYEOF'
          import os

          f = 'node_modules/browserslist/node.js'
          if not os.path.exists(f):
              print('browserslist/node.js not found, skipping')
              exit(0)

          with open(f, 'r') as fh:
              c = fh.read()

          # Replacement: pure string logic, zero regex literals, zero slashes in pattern.
          # Original did: name.replace(/^@[^/]+\/[^/]+/, '').indexOf('.') !== -1
          # i.e. strip "@scope/pkg" prefix from scoped package, then check for dot.
          NEW = "  if ((name.charAt(0)==='@'?name.split('/').slice(2).join('/'):name).indexOf('.')!==-1) {"

          # Handle original (unpatched) and any previously patched variants
          VARIANTS = [
              "  if (name.replace(/^@[^/]+\\/[^/]+/, '').indexOf('.') !== -1) {",
              "  if (name.replace(/^@[^\\/]+\\/[^\\/]+/, '').indexOf('.') !== -1) {",
              "  if (name.replace(/^@[^\\x2F]+[\\x2F][^\\x2F]+/, '').indexOf('.') !== -1) {",
          ]

          patched = False
          for OLD in VARIANTS:
              if OLD in c:
                  c = c.replace(OLD, NEW)
                  patched = True
                  print('Patched browserslist/node.js (matched variant)')
                  break

          if patched:
              with open(f, 'w') as fh:
                  fh.write(c)
          else:
              lines = c.split('\n')
              print('WARNING: No known pattern matched.')
              print('Line 30 content:', repr(lines[29]) if len(lines) >= 30 else 'N/A')
          PYEOF
          python3 /tmp/patch_browserslist.py

      - name: Build Angular app
        run: |
          npm run build -- --configuration=production || {
            echo ""
            echo "=== Angular Error Log ==="
            find /tmp -name "angular-errors.log" 2>/dev/null -exec cat {} \;
            exit 1
          }

      - name: Copy index.html as 404.html for SPA routing
        run: cp dist/arvo-water/browser/index.html dist/arvo-water/browser/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/arvo-water/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
