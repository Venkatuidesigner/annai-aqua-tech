name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install
          npm install browserslist@4.23.0

      - name: Print versions
        run: |
          node -v
          npm -v
          npx ng version || true

      - name: Build Angular app
        env:
          NODE_OPTIONS: --max_old_space_size=4096
        run: npx ng build --configuration=production --output-path=dist/site --base-href="/annai-aqua-tech/"

      - name: Resolve publish directory
        id: resolve_publish_dir
        shell: bash
        run: |
          set -e
          publish_dir="dist/site/browser"
          if [ ! -d "$publish_dir" ]; then
            publish_dir="dist/site"
          fi
          echo "publish_dir=$publish_dir" >> $GITHUB_OUTPUT

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.resolve_publish_dir.outputs.publish_dir }}

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4