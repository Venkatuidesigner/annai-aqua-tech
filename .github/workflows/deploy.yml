name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Show versions
        run: |
          node --version
          npm --version
          npx ng version --skip-confirmation 2>/dev/null || true

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular app
        run: |
          npm run build -- --configuration=production || {
            echo ""
            echo "=== Angular Error Log ==="
            find /tmp -name "angular-errors.log" 2>/dev/null -exec cat {} \;
            exit 1
          }

      - name: Copy index.html as 404.html for SPA routing
        run: cp dist/arvo-water/browser/index.html dist/arvo-water/browser/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/arvo-water/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
