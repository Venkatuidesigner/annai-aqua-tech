name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Patch browserslist V8 regex lexer bug
        run: |
          cat > /tmp/patch_browserslist.py << 'PYEOF'
          import os
          f = 'node_modules/browserslist/node.js'
          if not os.path.exists(f):
              print('File not found, skipping')
              exit(0)
          with open(f, 'r') as fh:
              c = fh.read()
          # Replace [^/] with [^\/] so V8 lexer does not treat the / inside
          # the character class as the regex terminator (V8 parsing bug).
          fixed = c.replace('[^/]', r'[^\/]')
          if fixed != c:
              with open(f, 'w') as fh:
                  fh.write(fixed)
              print('Patched: [^/] -> [^\\/] in browserslist/node.js')
          else:
              print('browserslist already clean, no patch needed')
          PYEOF
          python3 /tmp/patch_browserslist.py

      - name: Build Angular app
        run: |
          npm run build -- --configuration=production || {
            echo ""
            echo "=== Angular Error Log ==="
            find /tmp -name "angular-errors.log" 2>/dev/null -exec cat {} \;
            exit 1
          }

      - name: Copy index.html as 404.html for SPA routing
        run: cp dist/arvo-water/browser/index.html dist/arvo-water/browser/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/arvo-water/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
